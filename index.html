<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOTR 房源筛选</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F8FAFC;
  --surface:#FFFFFF;
  --text:#020617;
  --text-2:#334155;
  --text-3:#64748B;
  --text-4:#94A3B8;
  --border:#E2E8F0;
  --border-2:#CBD5E1;
  --border-soft:#F1F5F9;
  --brand:#0369A1;
  --brand-hover:#075985;
  --brand-soft:#F0F9FF;
  --brand-soft-2:#E0F2FE;
  --brand-border:#BAE6FD;
  --brand-text:#075985;
  --slate-900:#0F172A;
}

body{
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* ===== Topbar ===== */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:50;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,#0F172A 0%,#0369A1 100%);
  display:inline-flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:13px;letter-spacing:-.3px;
}
.brand h1{font-size:14px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.topbar-divider{width:1px;height:18px;background:var(--border);margin:0 4px}
.badge{
  background:var(--border-soft);
  color:var(--text-2);
  border-radius:5px;
  padding:3px 9px;
  font-size:12px;
  font-weight:500;
}
.badge-live{
  display:inline-flex;align-items:center;gap:6px;
  background:#DCFCE7;color:#166534;
}
.badge-live::before{
  content:'';width:6px;height:6px;border-radius:50%;background:#22C55E;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.update-time{font-size:12px;color:var(--text-3);font-variant-numeric:tabular-nums}
.refresh-btn{
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid var(--border-2);border-radius:6px;
  padding:5px 11px;font-size:12px;font-weight:500;
  background:var(--surface);cursor:pointer;color:var(--text-2);
  transition:all 150ms;font-family:inherit;
}
.refresh-btn:hover{background:var(--bg);border-color:var(--text-4)}
.refresh-btn svg{width:13px;height:13px}

/* ===== Filter container ===== */
.filter-container{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 24px 12px;
  display:flex;flex-direction:column;gap:8px;
}

/* 日期组 — 紧凑、淡蓝高亮 */
.date-inline{
  display:inline-flex;align-items:flex-end;gap:8px;
  background:var(--brand-soft);
  border:1px solid var(--brand-border);
  border-radius:7px;
  padding:5px 10px 6px;
}
.date-inline .filter-group label{color:var(--brand-text);font-weight:600}
.date-inline .date-arrow{
  align-self:center;color:var(--brand);font-weight:600;
  font-size:13px;margin-bottom:6px;
}

/* Filter row — 紧凑横向 */
.filter-row{display:flex;align-items:flex-end;flex-wrap:wrap;gap:10px}
.filter-group-block{display:flex;align-items:flex-end;gap:8px}
.filter-group-block.actions{margin-left:auto}

/* 更多筛选下拉面板 */
.more-wrapper{position:relative}
.more-panel{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:14px;
  box-shadow:0 8px 24px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.05);
  z-index:30;display:none;
  min-width:380px;
}
.more-panel.open{display:flex;gap:10px;flex-wrap:wrap}
.more-btn.open{background:var(--brand-soft);border-color:var(--brand-border);color:var(--brand-text)}

.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group label{
  font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.1px;
}

/* Inputs */
select,input[type=text],input[type=number],input[type=date]{
  border:1px solid var(--border-2);
  border-radius:6px;
  padding:0 10px;
  height:32px;
  font-size:13px;
  background:var(--surface);
  color:var(--text);
  outline:none;
  font-family:inherit;
  transition:border-color 150ms,box-shadow 150ms;
}
select{padding-right:28px;cursor:pointer}
select:hover,input:hover{border-color:var(--text-4)}
select:focus,input:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(3,105,161,.12);
}
input::placeholder{color:var(--text-4)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--border-2);border-radius:6px;
  padding:0 14px;height:32px;font-size:13px;font-weight:500;
  background:var(--surface);color:var(--text-2);cursor:pointer;
  font-family:inherit;transition:all 150ms;white-space:nowrap;
}
.btn:hover{background:var(--bg);border-color:var(--text-4)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:var(--brand-hover);border-color:var(--brand-hover)}
.btn svg{width:13px;height:13px}

/* Quick dates — 紧贴日期组下方 */
.quick-dates{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.quick-dates .label{
  font-size:11px;font-weight:500;color:var(--text-3);margin-right:2px;
}
.qd-btn{
  border:1px solid var(--brand-border);background:var(--surface);
  color:var(--brand-text);border-radius:5px;
  padding:4px 11px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all 120ms;
}
.qd-btn:hover{background:var(--brand-soft-2)}
.qd-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* ===== Content ===== */
.content{padding:20px 24px}

.results-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;flex-wrap:wrap;gap:12px;
}
.results-header .count{font-size:13px;color:var(--text-2);font-weight:600;font-variant-numeric:tabular-nums}
.results-header .count em{font-style:normal;color:var(--brand);font-weight:700}

.sort-btns{display:flex;gap:4px;align-items:center}
.sort-btns .label{font-size:12px;color:var(--text-4);margin-right:6px}
.sort-btn{
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);border-radius:5px;
  padding:4px 10px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all 120ms;
}
.sort-btn:hover{background:var(--bg);border-color:var(--border-2)}
.sort-btn.active{background:var(--slate-900);color:#fff;border-color:var(--slate-900)}

/* Cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px;
  transition:border-color 200ms,box-shadow 200ms,transform 200ms;
  cursor:pointer;
}
.card:hover{
  border-color:var(--border-2);
  box-shadow:0 1px 3px rgba(15,23,42,.04),0 1px 2px rgba(15,23,42,.04);
  transform:translateY(-1px);
}
.card-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:8px;gap:8px;
}
.condo{
  font-size:13px;font-weight:600;color:var(--text);
  line-height:1.35;flex:1;
}
.rt-badge{
  font-size:11px;font-weight:700;border-radius:4px;
  padding:2px 7px;white-space:nowrap;letter-spacing:.2px;
}
.rt-CR{background:#DBEAFE;color:#1D4ED8}
.rt-MB{background:#EDE9FE;color:#6D28D9}
.rt-EC{background:#DCFCE7;color:#166534}
.rt-PR{background:#FEF3C7;color:#B45309}
.rt-ST{background:#FCE7F3;color:#9D174D}
.rt-other{background:#F1F5F9;color:#475569}

.addr{
  font-size:12px;color:var(--text-3);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.unit{font-size:11px;color:var(--text-4);margin-bottom:10px}

.rent-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.rent{
  font-size:20px;font-weight:700;color:var(--text);
  letter-spacing:-.4px;font-variant-numeric:tabular-nums;
}
.rent .unit-label{
  font-size:12px;font-weight:400;color:var(--text-3);margin-left:2px;
}
.closing{
  font-size:12px;color:var(--text-3);font-variant-numeric:tabular-nums;
}

.info-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{
  font-size:11px;background:var(--border-soft);color:var(--text-2);
  border-radius:4px;padding:2px 7px;font-weight:500;
}
.tag.green{background:#DCFCE7;color:#166534}
.tag.red{background:#FEE2E2;color:#B91C1C}
.tag.orange{background:#FFEDD5;color:#C2410C}
.tag.blue{background:#DBEAFE;color:#1D4ED8}
.tag.mi-highlight{
  background:var(--brand-soft);color:var(--brand-text);
  border:1px solid var(--brand-border);font-weight:600;
}

.card-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft);
}
.region-info{
  font-size:12px;color:var(--text-3);
  display:inline-flex;align-items:center;gap:5px;font-weight:500;
}
.region-dot{
  width:6px;height:6px;border-radius:50%;display:inline-block;
}
a.photo-link{
  font-size:12px;color:var(--brand);text-decoration:none;font-weight:500;
  display:inline-flex;align-items:center;gap:3px;transition:color 150ms;
}
a.photo-link:hover{color:var(--brand-hover);text-decoration:underline}
a.photo-link svg{width:12px;height:12px}
.no-photo{font-size:12px;color:var(--border-2)}

.no-results{
  text-align:center;color:var(--text-4);
  padding:60px 24px;grid-column:1/-1;font-size:14px;
}

/* ===== 学校选择器（顶栏） ===== */
.school-picker{display:inline-flex;align-items:center;gap:8px;margin-right:4px}
.school-picker select{
  background:#1f2937;color:#fff;border:1px solid #374151;border-radius:6px;
  height:28px;padding:0 28px 0 10px;font-size:12px;font-weight:500;
  font-family:inherit;cursor:pointer;outline:none;
}
.school-picker select:hover{border-color:#4b5563;background:#111827}
.school-picker select:focus{border-color:#0ea5e9}

/* 通勤标签（卡片上） */
.tag.commute{
  background:#0c4a6e;color:#bae6fd;font-weight:600;
}
.tag.commute.fast{background:#14532d;color:#86efac}
.tag.commute.med{background:#78350f;color:#fcd34d}
.tag.commute.slow{background:#7f1d1d;color:#fca5a5}

/* 通勤筛选条（在筛选行里） */
.commute-filter{
  display:none;align-items:flex-end;gap:6px;
  background:#f0f9ff;border:1px solid #bae6fd;
  border-radius:6px;padding:4px 8px 5px;
}
.commute-filter.active{display:inline-flex}
.commute-filter label{color:#075985;font-weight:600;font-size:11px}

/* ===== 视图切换（在顶栏，暗底） ===== */
.view-toggle{
  display:inline-flex;border:1px solid #374151;border-radius:6px;
  overflow:hidden;
}
.view-toggle button{
  border:0;background:transparent;color:#d1d5db;
  padding:0 11px;height:28px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:5px;
  transition:all 120ms;
}
.view-toggle button:not(:first-child){border-left:1px solid #374151}
.view-toggle button:hover:not(.active){background:#1f2937;color:#fff}
.view-toggle button.active{background:#fff;color:var(--slate-900)}
.view-toggle button svg{width:13px;height:13px}

#map{
  height:calc(100vh - 280px);
  min-height:500px;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  background:#e7eef4;
}
#map .leaflet-popup-content-wrapper{border-radius:8px;font-family:inherit}
#map .leaflet-popup-content{margin:10px 12px;font-size:12px;line-height:1.5}
#map .pop-condo{font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px}
#map .pop-addr{color:var(--text-3);font-size:11px;margin-bottom:6px}
#map .pop-rent{font-weight:700;color:var(--brand);font-size:14px;margin-bottom:4px}
#map .pop-meta{color:var(--text-3);font-size:11px}
#map .pop-list{max-height:280px;overflow-y:auto;margin:-4px -8px}
#map .pop-list-item{padding:6px 8px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background 120ms}
#map .pop-list-item:last-child{border-bottom:0}
#map .pop-list-item:hover{background:var(--bg)}

/* Pin 标签（用 div 而不是 leaflet 默认 marker，更可控） */
.pin-marker{
  background:var(--brand);color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid #fff;
  box-shadow:0 2px 4px rgba(0,0,0,.2);font-family:inherit;
  cursor:pointer;
}
.pin-marker.east{background:#3b82f6}
.pin-marker.west{background:#10b981}
.pin-marker.central{background:#f59e0b}
.pin-marker.north{background:#8b5cf6}
.pin-marker.cluster{width:36px;height:36px;font-size:13px}

#map-status{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,.95);
  border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;font-size:11px;color:var(--text-3);
  z-index:1000;font-weight:500;backdrop-filter:blur(4px);
}
.no-results small{display:block;margin-top:6px;color:var(--border-2)}

/* Loading */
.loading-state{text-align:center;padding:80px 20px;color:var(--text-4)}
.spinner{
  display:inline-block;width:28px;height:28px;
  border:3px solid var(--border);border-top-color:var(--brand);
  border-radius:50%;animation:spin 700ms linear infinite;
  margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.error-state{
  text-align:center;padding:48px 24px;color:#B91C1C;
  background:#FEE2E2;border:1px solid #FECACA;
  border-radius:8px;margin:20px;
}

/* Pagination */
#pager{
  display:flex;gap:4px;justify-content:center;align-items:center;
  padding:28px 0 8px;flex-wrap:wrap;
}
#pager .pg-btn{
  min-width:32px;height:32px;padding:0 11px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);font-size:12px;font-weight:500;
  border-radius:5px;cursor:pointer;font-family:inherit;
  transition:all 120ms;
}
#pager .pg-btn:hover:not(:disabled){background:var(--bg);border-color:var(--border-2)}
#pager .pg-btn.active{
  background:var(--slate-900);color:#fff;border-color:var(--slate-900);
}
#pager .pg-btn:disabled{opacity:.4;cursor:not-allowed}
#pager .pg-ellipsis{color:var(--text-4);padding:0 4px;font-size:12px}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    transition-duration:.01ms!important;
  }
}
</style>
</head>
<body>

<!-- ===== Topbar ===== -->
<header class="topbar">
  <div class="brand">
    <span class="brand-mark">A</span>
    <h1>AOTR · Bespoke 房源筛选</h1>
  </div>
  <span class="topbar-divider"></span>
  <span class="badge" id="total-badge">加载中...</span>
  <span class="badge badge-live">实时数据</span>

  <div class="topbar-right">
    <div class="school-picker">
      <label for="school" style="color:#9ca3af;font-size:12px;font-weight:500">🎓 目标学校</label>
      <select id="school">
        <option value="">未选</option>
      </select>
    </div>
    <div class="view-toggle">
      <button id="view-list" class="active" onclick="setView('list')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        列表
      </button>
      <button id="view-map" onclick="setView('map')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        地图
      </button>
    </div>
    <span class="update-time" id="update-time"></span>
    <button class="refresh-btn" onclick="loadData()" aria-label="刷新数据">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      刷新
    </button>
  </div>
</header>

<!-- ===== Filters ===== -->
<section class="filter-container">

  <!-- 主筛选行：日期组 + 位置 + 房型 + 价格 + 重置 -->
  <div class="filter-row">

    <!-- 日期组（高亮淡蓝） -->
    <div class="date-inline">
      <div class="filter-group">
        <label for="mi_from">入住 · 最早</label>
        <input type="date" id="mi_from" value="2026-06-01">
      </div>
      <span class="date-arrow">→</span>
      <div class="filter-group">
        <label for="mi_to">最晚</label>
        <input type="date" id="mi_to" value="2026-07-31">
      </div>
      <div class="filter-group">
        <label for="include_vacant">已空置</label>
        <select id="include_vacant" style="width:74px">
          <option value="1">包含</option>
          <option value="0">不含</option>
        </select>
      </div>
    </div>

    <!-- 主筛选（高频） -->
    <div class="filter-group-block">
      <div class="filter-group">
        <label for="region">地区</label>
        <select id="region" style="width:96px">
          <option value="">全部</option>
          <option>East</option>
          <option>West</option>
          <option>Central</option>
          <option>North</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="rtype">房型大类</label>
        <select id="rtype" style="width:130px">
          <option value="">全部</option>
          <option value="CR">CR · 普通</option>
          <option value="MB">MBR · 主卧</option>
          <option value="EC">ECON · 经济</option>
          <option value="PR">PR · 高级</option>
          <option value="ST">Studio</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="min_rent">租金</label>
        <div style="display:flex;gap:4px;align-items:center">
          <input type="number" id="min_rent" placeholder="最低" style="width:78px" step="100">
          <span style="color:var(--text-4);font-size:12px">~</span>
          <input type="number" id="max_rent" placeholder="最高" style="width:78px" step="100">
        </div>
      </div>
      <div class="filter-group">
        <label for="search">搜索</label>
        <input type="text" id="search" placeholder="公寓名 / 地址" style="width:160px">
      </div>
    </div>

    <!-- 通勤上限（仅当选了学校时出现） -->
    <div id="commute-filter" class="commute-filter">
      <div class="filter-group">
        <label for="max_commute">通勤 ≤</label>
        <select id="max_commute" style="width:96px">
          <option value="0">不限</option>
          <option value="30">30 分钟</option>
          <option value="45">45 分钟</option>
          <option value="60">60 分钟</option>

<main class="content">
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <div>正在从 Google Sheet 加载数据...</div>
  </div>

      <div id="map"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxZiDMWyA9fkpVOAaXuCczGeZXmpid9EYgKHyRRdecsdpkw8pZIhRZNesq5kcYTV_cT/exec';
const GEOCODES_URL = 'geocodes.json';
const COMMUTE_URL = 'commute.json';
let DATA = [];
let GEOCODES = {};
let COMMUTE = {schools: [], matrix: {}};
let SCHOOL_KEY = '';     // 当前选中学校
let MAX_COMMUTE = 0;     // 通勤上限筛选（分钟，0=不限）
let sortMode = 'id';
let currentView = 'list';
let currentPage = 1;
const PAGE_SIZE = 100;
let lastFiltered = [];
let mapInstance = null;
let mapMarkers = [];
let schoolMarker = null;

async function fetchWithRetry(url, maxRetries = 3) {
  const delays = [0, 1000, 3000]; // 立即 → 1s → 3s
  let lastErr;
  for (let i = 0; i < maxRetries; i++) {
    if (delays[i] > 0) {
      document.getElementById('loading-state').querySelector('div:last-child').textContent =
        `第 ${i + 1}/${maxRetries} 次重试中...`;
      await new Promise(r => setTimeout(r, delays[i]));
    }
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json || !Array.isArray(json.data)) throw new Error('返回格式异常');
      return json;
    } catch (err) {
      lastErr = err;
      console.warn(`[loadData] 第 ${i + 1} 次失败:`, err.message);
    }
  }
  throw lastErr;
}

async function loadData() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('loading-state').querySelector('div:last-child').textContent =
    '正在从 Google Sheet 加载数据...';
  document.getElementById('error-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('total-badge').textContent = '加载中...';

  try {
    // 并行加载房源 + 地理编码 + 通勤矩阵
    const [json, geo, commute] = await Promise.all([
      fetchWithRetry(API_URL, 3),
      fetch(GEOCODES_URL, {cache: 'no-store'}).then(r => r.ok ? r.json() : {}).catch(() => ({})),
      fetch(COMMUTE_URL,  {cache: 'no-store'}).then(r => r.ok ? r.json() : {schools:[],matrix:{}}).catch(() => ({schools:[],matrix:{}}))
    ]);
    DATA = json.data || [];
    GEOCODES = geo || {};
    COMMUTE = commute || {schools:[], matrix:{}};

    // 填充学校下拉
    const schoolSel = document.getElementById('school');
    schoolSel.innerHTML = '<option value="">未选</option>';
    (COMMUTE.schools || []).forEach(s => {
      const o = document.createElement('option');
      o.value = s.key;
      o.text = s.name_cn + ' (' + s.key + ')';
      schoolSel.appendChild(o);
    });

    document.getElementById('total-badge').textContent = '共 ' + DATA.length.toLocaleString() + ' 房源';

    const updated = new Date(json.updated);
    document.getElementById('update-time').textContent =
      '更新 ' + updated.toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

    const rtSel = document.getElementById('rt_specific');
    rtSel.innerHTML = '<option value="">全部</option>';
    [...new Set(DATA.map(u => u.room))].sort().forEach(rt => {
      const o = document.createElement('option');
      o.value = rt; o.text = rt;
      rtSel.appendChild(o);
    });

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    filter();
  } catch (err) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('error-state').textContent =
      '加载失败（已自动重试 3 次）。请点击右上角「刷新」按钮再试一次。\n错误: ' + err.message;
  }
}

function filter() {
  if (!DATA.length) return;
  const search       = document.getElementById('search').value.trim().toLowerCase();
  const region       = document.getElementById('region').value;
  const rtype        = document.getElementById('rtype').value;
  const rtspec       = document.getElementById('rt_specific').value;
  const beds         = document.getElementById('beds').value;
  const maxRent      = parseFloat(document.getElementById('max_rent').value) || Infinity;
  const minRent      = parseFloat(document.getElementById('min_rent').value) || 0;
  const autoclose    = document.getElementById('autoclose').value;
  const femaleOnly   = document.getElementById('female_only').value;
  const includeVacant= document.getElementById('include_vacant').value === '1';
  const miFrom       = document.getElementById('mi_from').value;
  const miTo         = document.getElementById('mi_to').value;
  const fromDate     = miFrom ? new Date(miFrom) : null;
  const toDate       = miTo   ? new Date(miTo)   : null;

  let res = DATA.filter(u => {
    if (search && !(
      u.condo.toLowerCase().includes(search) ||
      u.address.toLowerCase().includes(search) ||
      u.unit.toLowerCase().includes(search)
    )) return false;
    if (region  && u.region !== region)            return false;
    if (rtype   && !u.room.startsWith(rtype))      return false;
    if (rtspec  && u.room !== rtspec)              return false;
    if (beds    && parseInt(u.beds) !== parseInt(beds)) return false;
    if (u.asking_rent <= 0) return false;
    if (u.asking_rent > maxRent || u.asking_rent < minRent) return false;
    if (autoclose && u.auto_close !== autoclose)   return false;
    if (femaleOnly) {
      const isFemale = u.notes.includes('FEMALE');
      if (femaleOnly === 'Y' && !isFemale) return false;
      if (femaleOnly === 'N' && isFemale)  return false;
    }

    // 通勤上限筛选（仅当选了学校 + 设了上限）
    if (SCHOOL_KEY && MAX_COMMUTE > 0) {
      const c = (COMMUTE.matrix[u.address] || {})[SCHOOL_KEY];
      if (!c || c.min > MAX_COMMUTE) return false;
    }

    if (fromDate || toDate) {
      const mi = parseMoveIn(u.move_in);
      if (!mi) {
        // 已空置房源：可协调起租到 今天+30天 内
        if (!includeVacant || u.vacant_days <= 0) return false;
        if (fromDate) {
          const today = new Date(); today.setHours(0,0,0,0);
          const vacantLimit = new Date(today.getTime() + 30 * 86400000);
          if (fromDate > vacantLimit) return false;
        }
        return true;
      }
      // 有 earliest_move_in：下限往前推14天，可协调到 mi_from
      const adjustedFrom = fromDate ? new Date(fromDate.getTime() - 14 * 86400000) : null;
      if (adjustedFrom && mi < adjustedFrom) return false;
      if (toDate && mi > toDate) return false;
    }
    return true;
  });

  res.sort((a, b) => {
    if (sortMode === 'id')       return a.no - b.no;
    if (sortMode === 'ask_asc')  return a.asking_rent - b.asking_rent;
    if (sortMode === 'ask_desc') return b.asking_rent - a.asking_rent;
    if (sortMode === 'vd_desc')  return b.vacant_days - a.vacant_days;
    if (sortMode === 'mi') {
      const da = parseMoveIn(a.move_in) || new Date('9999-12-31');
      const db = parseMoveIn(b.move_in) || new Date('9999-12-31');
      return da - db;
    }
    if (sortMode === 'commute' && SCHOOL_KEY) {
      const ca = (COMMUTE.matrix[a.address] || {})[SCHOOL_KEY];
      const cb = (COMMUTE.matrix[b.address] || {})[SCHOOL_KEY];
      return (ca?.min ?? 999) - (cb?.min ?? 999);
    }
    return 0;
  });

  lastFiltered = res;
  currentPage = 1;
  if (currentView === 'map') {
    renderMap();
    document.getElementById('count').innerHTML =
      res.length === 0 ? '没有匹配结果' : `共 <em>${res.length.toLocaleString()}</em> 个结果`;
  } else {
    renderPage();
  }
}

// ========== 视图切换 ==========
function setView(view) {
  currentView = view;
  document.getElementById('view-list').classList.toggle('active', view === 'list');
  document.getElementById('view-map').classList.toggle('active', view === 'map');
  document.getElementById('grid').style.display = view === 'list' ? '' : 'none';
  document.getElementById('map-wrapper').style.display = view === 'map' ? '' : 'none';
  document.getElementById('sort-btns').style.display = view === 'list' ? '' : 'none';

  // 翻页器仅列表显示
  const pager = document.getElementById('pager');
  if (pager) pager.style.display = view === 'list' ? '' : 'none';

  if (view === 'map') {
    renderMap();
    // 切换到地图时手动触发学校 pin 渲染
    if (SCHOOL_KEY) {
      const ev = new Event('change');
      // 触发 school select 的逻辑画 school pin
      const sch = COMMUTE.schools.find(s => s.key === SCHOOL_KEY);
      if (sch && mapInstance) {
        if (schoolMarker) { mapInstance.removeLayer(schoolMarker); }
        const html = '<div style="background:#0369a1;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">🎓</div>';
        const icon = L.divIcon({html, className:'', iconSize:[32,32], iconAnchor:[16,16]});
        schoolMarker = L.marker([sch.lat, sch.lng], {icon, zIndexOffset: 1000}).addTo(mapInstance);
        schoolMarker.bindPopup('<b>' + sch.name_cn + '</b><br>' + sch.name_en, {maxWidth:200});
      }
    }
    document.getElementById('count').innerHTML =
      lastFiltered.length === 0 ? '没有匹配结果' : `共 <em>${lastFiltered.length.toLocaleString()}</em> 个结果`;
  } else {
    renderPage();
  }
}

// ========== 地图渲染 ==========
function ensureMap() {
  if (mapInstance) return mapInstance;
  // 默认中心：新加坡几何中心
  mapInstance = L.map('map', {zoomControl: true}).setView([1.3521, 103.8198], 11);
  // OneMap 瓦片（新加坡政府官方，免费，无需 API key）
  L.tileLayer('https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png', {
    attribution: '<a href="https://www.onemap.gov.sg/" target="_blank">OneMap</a> &copy; contributors',
    maxZoom: 18,
    minZoom: 10
  }).addTo(mapInstance);
  return mapInstance;
}

function regionClass(r) {
  return ({East:'east',West:'west',Central:'central',North:'north'})[r] || '';
}

function renderMap() {
  const map = ensureMap();
  // 清除旧 markers
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  // 按地址聚合 — 同地址多套房源用一个 pin（数字显示数量）
  const buckets = {};
  let geocoded = 0, missing = 0;
  for (const u of lastFiltered) {
    const g = GEOCODES[u.address];
    if (!g || !g.lat) { missing++; continue; }
    geocoded++;
    const key = `${g.lat.toFixed(5)},${g.lng.toFixed(5)}`;
    if (!buckets[key]) buckets[key] = {lat: g.lat, lng: g.lng, units: []};
    buckets[key].units.push(u);
  }

  // 状态条
  document.getElementById('map-status').innerHTML =
    `📍 ${geocoded} 套已定位 / ${Object.keys(buckets).length} 个地点` +
    (missing > 0 ? ` · <span style="color:#c2410c">${missing} 套地址缺失</span>` : '');

  if (geocoded === 0) {
    return;
  }

  // 渲染 pins
  Object.values(buckets).forEach(bucket => {
    const u0 = bucket.units[0];
    const count = bucket.units.length;
    const isCluster = count > 1;
    // 选了学校 → 按通勤时间染色；否则按地区
    let pinStyle = '';
    let extraClass = '';
    if (SCHOOL_KEY) {
      const color = commuteColor(u0.address);
      pinStyle = `style="background:${color}"`;
    } else {
      extraClass = regionClass(u0.region);
    }
    const html = `<div class="pin-marker ${extraClass} ${isCluster ? 'cluster' : ''}" ${pinStyle}>${count}</div>`;
    const icon = L.divIcon({
      html, className: '', iconSize: isCluster ? [36,36] : [24,24], iconAnchor: isCluster ? [18,18] : [12,12]
    });
    const marker = L.marker([bucket.lat, bucket.lng], {icon}).addTo(map);

    // 弹窗内容
    let popup;
    if (count === 1) {
      popup = `
        <div class="pop-condo">${esc(u0.condo)}</div>
        <div class="pop-addr">${esc(u0.address)}</div>
        <div class="pop-rent">$${u0.asking_rent.toLocaleString()}/月</div>
        <div class="pop-meta">${esc(u0.room)} · ${esc(u0.beds)} · ${esc(u0.region)} · #${u0.no}</div>
        ${u0.photos ? `<div style="margin-top:6px"><a class="photo-link" href="${esc(u0.photos)}" target="_blank">查看照片 →</a></div>` : ''}
      `;
    } else {
      popup = `
        <div class="pop-condo">${esc(u0.condo)} 等 ${count} 套</div>
        <div class="pop-addr">${esc(u0.address)}</div>
        <div class="pop-list">
          ${bucket.units.slice(0, 12).map(u => `
            <div class="pop-list-item">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-weight:600">${esc(u.room)} · ${esc(u.beds)}</span>
                <span style="color:var(--brand);font-weight:700">$${u.asking_rent.toLocaleString()}</span>
              </div>
              <div style="font-size:11px;color:var(--text-3);margin-top:2px">${esc(u.unit)} · #${u.no}</div>
            </div>
          `).join('')}
          ${count > 12 ? `<div style="text-align:center;padding:6px;color:var(--text-4);font-size:11px">还有 ${count - 12} 套...</div>` : ''}
        </div>
      `;
    }
    marker.bindPopup(popup, {maxWidth: 280});
    mapMarkers.push(marker);
  });

  // 自动 fit 到所有 pin 的范围
  if (mapMarkers.length > 0) {
    const group = L.featureGroup(mapMarkers);
    map.fitBounds(group.getBounds().pad(0.15), {maxZoom: 14});
  }
}

function renderPage() {
  const total = lastFiltered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = lastFiltered.slice(start, start + PAGE_SIZE);

  const countEl = document.getElementById('count');
  if (total === 0) {
    countEl.textContent = '没有匹配结果';
  } else if (totalPages === 1) {
    countEl.innerHTML = `共 <em>${total.toLocaleString()}</em> 个结果`;
  } else {
    countEl.innerHTML = `共 <em>${total.toLocaleString()}</em> 个结果 · 第 ${currentPage} / ${totalPages} 页`;
  }

  renderCards(slice);

  // Pagination
  let pager = document.getElementById('pager');
  if (!pager) {
    pager = document.createElement('div');
    pager.id = 'pager';
    document.getElementById('grid').after(pager);
  }
  if (totalPages <= 1) { pager.innerHTML = ''; return; }

  const pages = [];
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || Math.abs(p - currentPage) <= 2) {
      pages.push(p);
    } else if (pages[pages.length - 1] !== '…') {
      pages.push('…');
    }
  }

  pager.innerHTML =
    `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← 上页</button>` +
    pages.map(p => p === '…'
      ? `<span class="pg-ellipsis">…</span>`
      : `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
    ).join('') +
    `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下页 →</button>`;
}

function goPage(p) {
  const totalPages = Math.ceil(lastFiltered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">没有找到匹配的房源<small>试试放宽日期范围或其他条件</small></div>';
    return;
  }
  const isDateFiltered = document.getElementById('mi_from').value || document.getElementById('mi_to').value;

  grid.innerHTML = list.map(u => {
    const miParsed = parseMoveIn(u.move_in);
    const miDate = miParsed
      ? miParsed.toLocaleDateString('zh-CN', {year:'numeric',month:'short',day:'numeric'})
      : null;
    const vdClass     = u.vacant_days > 60 ? 'red' : u.vacant_days > 30 ? 'orange' : 'green';
    const isPartner   = u.notes.includes('Partner');
    const femaleOnly  = u.notes.includes('FEMALE');
    const miHighlight = isDateFiltered && miDate ? ' mi-highlight' : '';

    return '<div class="card">' +
      '<div class="card-top">' +
        '<div class="condo">' + esc(u.condo) + '</div>' +
        '<span class="rt-badge ' + rtClass(u.room) + '">' + esc(u.room) + '</span>' +
      '</div>' +
      '<div class="addr">' + esc(u.address) + '</div>' +
      '<div class="unit">' + esc(u.unit) + '</div>' +
      '<div class="rent-row">' +
        '<div class="rent">$' + u.asking_rent.toLocaleString() + '<span class="unit-label">/月</span></div>' +
        (u.closing_rent && u.closing_rent !== u.asking_rent
          ? '<div class="closing">议价 $' + u.closing_rent.toLocaleString() + '</div>' : '') +
      '</div>' +
      '<div class="info-row">' +
        '<span class="tag">' + esc(u.beds) + '</span>' +
        commuteTag(u) +
        (miDate ? '<span class="tag' + miHighlight + '">入住 ' + miDate + '</span>' : '') +
        (u.vacant_days > 0 ? '<span class="tag ' + vdClass + '">空置 ' + u.vacant_days + ' 天</span>' : '') +
        (u.auto_close === 'Y' ? '<span class="tag green">Auto Close</span>' : '') +
        (isPartner   ? '<span class="tag blue">Partner</span>' : '') +
        (femaleOnly  ? '<span class="tag red">仅限女性</span>' : '') +
      '</div>' +
      '<div class="card-foot">' +
        '<span class="region-info">' +
          '<span class="region-dot" style="background:' + regionColor(u.region) + '"></span>' +
          esc(u.region) + ' · #' + u.no +
        '</span>' +
        (u.photos
          ? '<a class="photo-link" href="' + esc(u.photos) + '" target="_blank" rel="noopener">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
              '查看照片</a>'
          : '<span class="no-photo">暂无照片</span>') +
      '</div>' +
    '</div>';
  }).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 通勤标签（卡片用） — 仅在选了学校时显示
function commuteTag(u) {
  if (!SCHOOL_KEY) return '';
  const c = (COMMUTE.matrix[u.address] || {})[SCHOOL_KEY];
  if (!c) return '';
  const cls = c.min <= 30 ? 'fast' : c.min <= 45 ? 'med' : c.min <= 60 ? '' : 'slow';
  return '<span class="tag commute ' + cls + '">🚇 ' + c.min + ' min → ' + esc(SCHOOL_KEY) + '</span>';
}

// 通勤颜色 — 地图 pin 用
function commuteColor(addr) {
  if (!SCHOOL_KEY) return null;
  const c = (COMMUTE.matrix[addr] || {})[SCHOOL_KEY];
  if (!c) return '#9ca3af';
  if (c.min <= 30) return '#10b981';
  if (c.min <= 45) return '#f59e0b';
  if (c.min <= 60) return '#f97316';
  return '#ef4444';
}

// 鲁棒日期解析：支持 ISO "2026-05-10" 和 JS toString "Sun May 10 2026..."（含截断的 "GM"）
const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function parseMoveIn(s) {
  if (!s) return null;
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    return isNaN(d) ? null : d;
  }
  const m = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
  if (m && MONTHS[m[1]] !== undefined) {
    return new Date(parseInt(m[3]), MONTHS[m[1]], parseInt(m[2]));
  }
  return null;
}

function rtClass(rt) {
  if (rt.startsWith('CR')) return 'rt-CR';
  if (rt.startsWith('MB')) return 'rt-MB';
  if (rt.startsWith('EC')) return 'rt-EC';
  if (rt.startsWith('PR')) return 'rt-PR';
  if (rt.includes('STUDIO') || rt.startsWith('ST')) return 'rt-ST';
  return 'rt-other';
}

function regionColor(r) {
  return {East:'#3b82f6',West:'#10b981',Central:'#f59e0b',North:'#8b5cf6'}[r] || '#94a3b8';
}

function setQuickDate(from, to, btn) {
  document.getElementById('mi_from').value = from;
  document.getElementById('mi_to').value   = to;
  document.querySelectorAll('.qd-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filter();
}

function clearDateFilter() {
  document.getElementById('mi_from').value = '';
  document.getElementById('mi_to').value   = '';
  document.querySelectorAll('.qd-btn').forEach(b => b.classList.remove('active'));
  filter();
}

function setSort(btn, mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('min_rent').value = '';
  document.getElementById('max_rent').value = '';
  ['region','rtype','rt_specific','beds','autoclose','female_only'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('school').value = '';
  document.getElementById('max_commute').value = '0';
  SCHOOL_KEY = '';
  MAX_COMMUTE = 0;
  document.getElementById('commute-filter').classList.remove('active');
  document.getElementById('sort-commute').style.display = 'none';
  document.getElementById('include_vacant').value = '1';
  document.getElementById('mi_from').value = '';
  document.getElementById('mi_to').value   = '';
  document.querySelectorAll('.qd-btn').forEach(b => b.classList.remove('active'));
  sortMode = 'id';
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.sort-btn').classList.add('active');
  filter();
}

['search','region','rtype','rt_specific','beds','min_rent','max_rent','autoclose','female_only','include_vacant'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', () => {
    filter();
    updateMoreBtnBadge();
  });
});

// 学校选择
document.getElementById('school').addEventListener('change', e => {
  SCHOOL_KEY = e.target.value;
  // 通勤筛选 / 排序按钮显隐
  document.getElementById('commute-filter').classList.toggle('active', !!SCHOOL_KEY);
  document.getElementById('sort-commute').style.display = SCHOOL_KEY ? '' : 'none';
  // 切换学校时如果当前是 commute 排序但没学校，回退到 id
  if (!SCHOOL_KEY && sortMode === 'commute') {
    sortMode = 'id';
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.sort-btn').classList.add('active');
  }
  // 地图模式：刷新学校 pin
  if (currentView === 'map' && mapInstance) {
    if (schoolMarker) { mapInstance.removeLayer(schoolMarker); schoolMarker = null; }
    if (SCHOOL_KEY) {
      const sch = COMMUTE.schools.find(s => s.key === SCHOOL_KEY);
      if (sch) {
        const html = '<div style="background:#0369a1;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">🎓</div>';
        const icon = L.divIcon({html, className:'', iconSize:[32,32], iconAnchor:[16,16]});
        schoolMarker = L.marker([sch.lat, sch.lng], {icon, zIndexOffset: 1000}).addTo(mapInstance);
        schoolMarker.bindPopup('<b>' + sch.name_cn + '</b><br>' + sch.name_en, {maxWidth:200});
      }
    }
  }
  filter();
});

// 通勤上限
document.getElementById('max_commute').addEventListener('change', e => {
  MAX_COMMUTE = parseInt(e.target.value) || 0;
  filter();
});

// 更多筛选面板：点击切换
function toggleMore() {
  const panel = document.getElementById('more-panel');
  const btn = document.getElementById('more-btn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}
// 点击外部自动关闭
document.addEventListener('click', (e) => {
  const panel = document.getElementById('more-panel');
  const btn = document.getElementById('more-btn');
  if (panel && panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
    btn.classList.remove('open');
  }
});
// 在按钮上显示已激活的高级筛选数（红色小圆点）
function updateMoreBtnBadge() {
  const advanced = ['rt_specific','beds','autoclose','female_only'];
  const count = advanced.filter(id => document.getElementById(id).value).length;
  const btn = document.getElementById('more-btn');
  let badge = btn.querySelector('.more-badge');
  if (count > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'more-badge';
      badge.style.cssText = 'background:var(--brand);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-right:2px';
      btn.insertBefore(badge, btn.firstChild);
    }
    badge.textContent = count;
  } else if (badge) {
    badge.remove();
  }
}
['mi_from','mi_to'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', filter);
  el.addEventListener('input', filter);
});

loadData();
</script>
